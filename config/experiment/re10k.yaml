# @package _global_

defaults:
  - /dataset@_group_.re10k: re10k
  - override /model/encoder: vggt
  - override /loss: [mse, lpips]

wandb:
  name: re10k_2view_8gpu
  tags: [re10k, 256x256]

model:
  encoder:
    gs_params_head_type: dpt_gs
    pose_free: true
    intrinsics_embed_loc: encoder
    intrinsics_embed_type: token
    pretrained_weights: './pretrained_weights/model.pt'
  decoder:
    make_scale_invariant: true

dataset:
  re10k:
    view_sampler:
      warm_up_steps: 15_000

optimizer:
  lr: 2e-4
  warm_up_steps: 250
  backbone_lr_multiplier: 0.1

data_loader:
  train:
    batch_size: 8

trainer:
  max_steps: 40_000
  val_check_interval: 500

checkpointing:
  every_n_train_steps: 10_000